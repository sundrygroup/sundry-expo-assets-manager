<!DOCTYPE html>
<html lang="en">

<head>
  <meta http-equiv="Content-Security-Policy" content="{{csp}}">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Expo Asset Manager</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #101214;
      --panel: #181b1f;
      --panel-2: #20242a;
      --line: #323842;
      --text: #f1f5f9;
      --muted: #9aa7b4;
      --accent: #4ade80;
      --accent-2: #38bdf8;
      --danger: #fca5a5;
      --radius: 8px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: var(--vscode-font-family, system-ui, sans-serif);
      font-size: var(--vscode-font-size, 13px);
    }

    button,
    input {
      font: inherit;
    }

    button {
      min-height: 32px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel-2);
      color: var(--text);
      cursor: pointer;
    }

    button:hover {
      border-color: var(--accent-2);
    }

    input {
      width: 100%;
      min-height: 32px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #0c0e10;
      color: var(--text);
      padding: 6px 9px;
    }

    .shell {
      max-width: 1180px;
      margin: 0 auto;
      padding: 24px;
    }

    .topbar,
    .settings,
    .status {
      display: grid;
      gap: 14px;
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
    }

    .topbar {
      grid-template-columns: 1fr auto;
      align-items: center;
      margin-bottom: 16px;
    }

    h1,
    h2,
    p {
      margin: 0;
    }

    h1 {
      font-size: 24px;
      font-weight: 650;
    }

    h2 {
      font-size: 14px;
      font-weight: 650;
    }

    .subtitle,
    .meta,
    .path,
    .hint {
      color: var(--muted);
    }

    .actions,
    .version,
    .path-grid,
    .asset-actions {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    .primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #05110a;
      font-weight: 650;
      padding-inline: 16px;
    }

    .icon-button {
      width: 34px;
      padding: 0;
      font-size: 18px;
      line-height: 1;
    }

    .source {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 8px;
      align-items: center;
      margin-bottom: 16px;
    }

    .pill {
      min-width: 0;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      padding: 7px 10px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #0c0e10;
      color: var(--muted);
    }

    .settings {
      grid-template-columns: minmax(220px, 1fr) 2fr;
      margin-bottom: 16px;
    }

    .version input {
      width: 58px;
      text-align: center;
    }

    .asset-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 12px;
    }

    .asset {
      display: grid;
      gap: 12px;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      min-width: 0;
    }

    .asset-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
    }

    .preview {
      display: grid;
      place-items: center;
      aspect-ratio: 16 / 10;
      border: 1px dashed var(--line);
      border-radius: var(--radius);
      background:
        linear-gradient(45deg, #0c0e10 25%, transparent 25%),
        linear-gradient(-45deg, #0c0e10 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #0c0e10 75%),
        linear-gradient(-45deg, transparent 75%, #0c0e10 75%);
      background-color: #15181c;
      background-size: 22px 22px;
      background-position: 0 0, 0 11px, 11px -11px, -11px 0;
      overflow: hidden;
    }

    .preview.dragover {
      border-color: var(--accent-2);
      outline: 2px solid rgba(56, 189, 248, .22);
    }

    .preview img {
      max-width: min(70%, 180px);
      max-height: 76%;
      object-fit: contain;
    }

    .preview.empty::before {
      content: "Drop image";
      color: var(--muted);
    }

    .path-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(120px, .75fr) auto;
      align-items: end;
    }

    .field {
      display: grid;
      gap: 5px;
      min-width: 0;
    }

    label {
      color: var(--muted);
      font-size: 12px;
    }

    .path {
      min-height: 18px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .status {
      margin-top: 16px;
      display: none;
    }

    .status.show {
      display: block;
    }

    .status.error {
      color: var(--danger);
      border-color: rgba(252, 165, 165, .45);
    }

    input[type="file"] {
      display: none;
    }

    @media (max-width: 760px) {
      .shell {
        padding: 14px;
      }

      .topbar,
      .settings,
      .source,
      .path-grid {
        grid-template-columns: 1fr;
      }

      .actions {
        justify-content: stretch;
      }

      .actions button,
      .source button {
        width: 100%;
      }
    }
  </style>
</head>

<body>
  <main class="shell">
    <section class="topbar">
      <div>
        <h1>Expo Asset Manager</h1>
        <p class="subtitle">Resize, preview, and write assets to the correct Expo config fields.</p>
      </div>
      <div class="actions">
        <button id="refresh" type="button" title="Refresh">Refresh</button>
        <button id="save" class="primary" type="button">Update Assets</button>
      </div>
    </section>

    <section class="source">
      <div id="source-path" class="pill" title="No source folder set">No source folder set</div>
      <button id="choose-source" type="button">Source Folder</button>
      <button id="reveal-source" type="button">Reveal</button>
    </section>

    <section class="settings">
      <div class="field">
        <h2>App Version</h2>
        <p class="meta">Saved to the Expo config when assets are updated.</p>
      </div>
      <div class="version" aria-label="App version">
        <button class="icon-button" type="button" data-step="major" data-delta="-1" title="Decrease major">-</button>
        <input id="major-version" inputmode="numeric" value="0" aria-label="Major version">
        <button class="icon-button" type="button" data-step="major" data-delta="1" title="Increase major">+</button>
        <span>.</span>
        <button class="icon-button" type="button" data-step="minor" data-delta="-1" title="Decrease minor">-</button>
        <input id="minor-version" inputmode="numeric" value="0" aria-label="Minor version">
        <button class="icon-button" type="button" data-step="minor" data-delta="1" title="Increase minor">+</button>
        <span>.</span>
        <button class="icon-button" type="button" data-step="patch" data-delta="-1" title="Decrease patch">-</button>
        <input id="patch-version" inputmode="numeric" value="0" aria-label="Patch version">
        <button class="icon-button" type="button" data-step="patch" data-delta="1" title="Increase patch">+</button>
      </div>
    </section>

    <section id="asset-grid" class="asset-grid" aria-label="Assets"></section>
    <section id="status" class="status" role="status"></section>
  </main>

  <script nonce="{{nonce}}" src="{{scriptUri}}"></script>
</body>

</html>
