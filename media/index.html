<!DOCTYPE html>
<html lang="en">

<head>
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'none'; img-src 'self' data:; script-src 'self' vscode-resource:; style-src 'self' 'unsafe-inline';">

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ExpoAssetManager</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f4f4f9;
    }

    .container {
      max-width: 800px;
      margin: 20px auto;
      padding: 20px;
      background: #ffffff;
      border-radius: 8px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
    }

    h1 {
      text-align: center;
      color: #333;
    }

    .guidelines {
      margin-bottom: 20px;
    }

    .guidelines h2 {
      margin-bottom: 10px;
    }

    .guidelines ul {
      list-style: none;
      padding: 0;
    }

    .guidelines li {
      margin: 5px 0;
      font-size: 14px;
    }

    .asset-form {
      display: grid;
      grid-template-columns: 1fr 2fr;
      gap: 10px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
    }

    label {
      font-size: 14px;
      font-weight: bold;
      margin-bottom: 5px;
    }

    input {
      padding: 8px;
      font-size: 14px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }

    .file-preview img {
      max-width: 100px;
      max-height: 100px;
      margin-top: 5px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }

    .current-path {
      font-size: 12px;
      color: #666;
    }

    button {
      grid-column: 1 / 3;
      padding: 10px;
      font-size: 16px;
      background-color: #007bff;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }

    button:hover {
      background-color: #0056b3;
    }

    .loading {
      text-align: center;
      margin: 10px 0;
      font-size: 14px;
      color: #555;
    }

    .error {
      color: red;
      font-size: 14px;
      margin-top: 10px;
    }

    .version-manager {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .version-manager input {
      width: 50px;
      text-align: center;
    }

    .version-manager button {
      padding: 5px;
      font-size: 14px;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>ExpoAssetManager</h1>

    <div class="guidelines">
      <h2>Icon Size Guidelines</h2>
      <ul>
        <li><strong>Favicon:</strong> 32x32</li>
        <li><strong>App Icon:</strong> 1024x1024</li>
        <li><strong>Splash Icon:</strong> 1280x720</li>
        <li><strong>Adaptive Icon:</strong> 1080x1080</li>
      </ul>
    </div>

    <form class="asset-form" id="assetForm">
      <div class="form-group">
        <label>App Version</label>
        <div class="version-manager">
          <button type="button" id="major-decrement">-</button>
          <input type="text" id="major-version" value="" />
          <button type="button" id="major-increment">+</button>
          .
          <button type="button" id="minor-decrement">-</button>
          <input type="text" id="minor-version" value="" />
          <button type="button" id="minor-increment">+</button>
          .
          <button type="button" id="patch-decrement">-</button>
          <input type="text" id="patch-version" value="" />
          <button type="button" id="patch-increment">+</button>
        </div>
      </div>

      <!-- Favicon -->
      <div class="form-group">
        <label for="favicon">Favicon</label>
        <input type="file" id="favicon" accept="image/*" />

        <!-- <div class="path-row">
          <input id="favicon-dir" placeholder="Relative folder (e.g. assets/images)" />
          <button type="button" class="choose-dir" data-asset="favicon" title="Choose folder">+</button>
        </div> -->

        <input id="favicon-name" placeholder="File name (e.g. favicon)" value="favicon" />
        <div class="file-preview">
          <img id="favicon-preview" src="{{favicon}}" alt="Current Favicon" />
        </div>
        <div class="current-path" id="favicon-fullpath">{{favicon}}</div>
      </div>

      <!-- App Icon -->
      <div class="form-group">
        <label for="icon">App Icon</label>
        <input type="file" id="icon" accept="image/*" />
        <!-- <div class="path-row">
          <input id="icon-dir" placeholder="Relative folder" />
          <button type="button" class="choose-dir" data-asset="icon" title="Choose folder">+</button>
          <input id="icon-name" placeholder="File name (e.g. icon.png)" />
        </div> -->
        <div class="current-path" id="icon-fullpath"></div>
        <div class="file-preview"><img id="icon-preview" src="{{icon}}" alt="Current App Icon" /></div>
      </div>

      <!-- Splash Icon -->
      <div class="form-group">
        <label for="splash-icon">Splash Icon</label>
        <input type="file" id="splash-icon" accept="image/*" />
        <!-- <div class="path-row">
          <input id="splash-icon-dir" placeholder="Relative folder" />
          <button type="button" class="choose-dir" data-asset="splash-icon" title="Choose folder">+</button>
          <input id="splash-icon-name" placeholder="File name (e.g. splash.png)" />
        </div> -->
        <div class="current-path" id="splash-icon-fullpath"></div>
        <div class="file-preview"><img id="splash-icon-preview" src="{{splash-icon}}" alt="Current Splash Icon" /></div>
      </div>

      <!-- Adaptive Icon -->
      <div class="form-group">
        <label for="adaptive-icon">Adaptive Icon</label>
        <input type="file" id="adaptive-icon" accept="image/*" />
        <!-- <div class="path-row">
          <input id="adaptive-icon-dir" placeholder="Relative folder" />
          <button type="button" class="choose-dir" data-asset="adaptive-icon" title="Choose folder">+</button>
          <input id="adaptive-icon-name" placeholder="File name (e.g. adaptive-icon.png)" />
        </div> -->
        <div class="current-path" id="adaptive-icon-fullpath"></div>
        <div class="file-preview"><img id="adaptive-icon-preview" src="{{adaptive-icon}}" alt="Current Adaptive Icon" />
        </div>
      </div>



      <button type="submit">Update</button>
    </form>
    <div class="loading" id="loading" style="display: none">
      Updating, please wait...
    </div>
    <div class="error" id="error-message" style="display: none"></div>
  </div>
  <script src="{{scriptUri}}"></script>
</body>

</html>
